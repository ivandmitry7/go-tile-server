<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile Self Server</title>
    <link href="lib/css/bootstrap.min.css" rel="stylesheet">
    <link href="lib/css/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="lib/css/leaflet.css" />
    <link rel="stylesheet" href="lib/css/leaflet.draw.css" />
    <style>
        :root, [data-bs-theme="dark"] {
            --bs-body-bg: #0d1117;
            --bs-body-color: #eee;
            --bs-border-color: #1b2838;
            --bs-tertiary-bg: #0d1117;
            --bs-secondary-bg: #0d1117;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

        /* Accordion */
        .accordion-button {
            background: #0d1117 !important; color: #8b949e !important;
            font-size: 13px; font-weight: 600; padding: 10px 12px;
            box-shadow: none !important;
        }
        .accordion-button:not(.collapsed) { color: #0097ee !important; background: #161b22 !important; }
        .accordion-button::after { filter: invert(1) brightness(0.7); }
        .accordion-body { background: #0d1117; padding: 10px !important; }
        .accordion-item { border-color: #1b2838 !important; background: transparent !important; }

        /* Form controls */
        .form-select, .form-control {
            background-color: #1a1a2e !important; border-color: #1b2838 !important;
            color: #eee !important; font-size: 13px;
        }
        .form-select:focus, .form-control:focus {
            border-color: #0097ee !important; box-shadow: 0 0 0 0.2rem rgba(0,151,238,0.25) !important;
        }
        .form-check-input { background-color: #1a1a2e; border-color: #1b2838; }
        .form-check-input:checked { background-color: #0097ee; border-color: #0097ee; }
        .form-label { color: #a8b2d1; margin-bottom: 2px; }

        /* Project list */
        .project-item {
            background: #0d1117; border: 1px solid #1b2838; color: #a8b2d1;
            padding: 6px 10px; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            border-radius: 4px; margin-bottom: 2px; transition: all 0.15s;
        }
        .project-item:hover { background: #161b22; color: #eee; }
        .project-item.active { background: #161b22; color: #0097ee; border-left: 3px solid #0097ee; }
        .project-item .project-actions { display: none; gap: 2px; }
        .project-item:hover .project-actions { display: flex; }

        /* Custom buttons */
        .btn-outline-purple { color: #9b59b6; border-color: #9b59b6; }
        .btn-outline-purple:hover { background: #9b59b6; color: #fff; }
        .btn-outline-purple.active { background: #e74c3c !important; border-color: #e74c3c !important; color: #fff; box-shadow: 0 0 0 2px #fff; }

        /* Tile count */
        .tile-count { color: #0097ee; font-weight: 700; font-size: 14px; }

        /* Badges */
        .badge-online { background: #2ecc71 !important; color: #fff; }
        .badge-offline { background: #e94560 !important; color: #fff; }

        /* Status bar */
        .status-bar {
            background: #0a0a1a; padding: 8px 16px;
            display: flex; align-items: center; gap: 12px;
            font-size: 13px; min-height: 40px;
        }
        .progress-wrap {
            flex: 1; background: #0d1117; border-radius: 10px;
            height: 20px; overflow: hidden; position: relative;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #0097ee, #1b2838);
            border-radius: 10px; transition: width 0.3s; width: 0%;
        }
        .progress-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 11px; font-weight: 600; color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* Map coord display */
        .coord-display {
            position: absolute; bottom: 8px; left: 8px; z-index: 1000;
            background: rgba(10,10,26,0.85); color: #a8b2d1; font-size: 12px;
            padding: 4px 10px; border-radius: 4px; font-family: monospace;
            pointer-events: none;
        }

        /* Annotation label */
        .annotation-label {
            background: rgba(22, 33, 62, 0.85); border: 1px solid #3498db;
            color: #eee; font-size: 12px; padding: 2px 6px; border-radius: 3px;
        }

        /* Modal overlay (annotation/properties modals) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-box {
            background: #161b22; border: 1px solid #1b2838; border-radius: 8px;
            padding: 20px; min-width: 320px; max-height: 60vh; overflow-y: auto;
        }
        .modal-box h3 { margin-bottom: 12px; color: #0097ee; }
        .modal-list { list-style: none; padding: 0; }
        .modal-list li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 10px; border-bottom: 1px solid #1b2838; cursor: pointer;
        }
        .modal-list li:hover { background: #0d1117; }
        .modal-list li .name { flex: 1; }
        .modal-list li .btn-del { background: #e74c3c; color: #fff; border: none;
            padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        /* Property form (annotation modal) */
        .prop-form { display: flex; flex-direction: column; gap: 10px; }
        .prop-form label { font-size: 13px; color: #a8b2d1; }
        .prop-form input[type="text"], .prop-form select {
            width: 100%; padding: 6px 8px; border: 1px solid #1b2838;
            background: #0d1117; color: #eee; border-radius: 4px; font-size: 13px;
        }
        .prop-form input[type="color"] {
            width: 50px; height: 30px; border: 1px solid #1b2838;
            background: #0d1117; cursor: pointer; border-radius: 4px; padding: 2px;
        }
        .prop-form input[type="number"] {
            width: 100%; padding: 6px 8px; border: 1px solid #1b2838;
            background: #0d1117; color: #eee; border-radius: 4px; font-size: 13px;
        }
        .prop-form textarea {
            width: 100%; padding: 6px 8px; border: 1px solid #1b2838;
            background: #0d1117; color: #eee; border-radius: 4px; font-size: 12px;
            font-family: monospace; resize: vertical;
        }
        .prop-row { display: flex; align-items: center; gap: 10px; }
        .icon-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .icon-opt {
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; border: 2px solid #1b2838; border-radius: 6px; cursor: pointer;
            background: #0d1117; transition: all 0.15s;
        }
        .icon-opt:hover, .icon-opt.selected { border-color: #0097ee; background: #161b22; }
        .prop-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }

        .hidden { display: none !important; }

        /* Sidebar scrollbar */
        .sidebar-scroll::-webkit-scrollbar { width: 6px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: #0d1117; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #1b2838; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="d-flex" style="height: 100vh;">
        <!-- LEFT SIDEBAR -->
        <div id="sidebar" class="d-flex flex-column" style="width: 280px; min-width: 280px; background: #0d1117; border-right: 2px solid #1b2838;">
            <!-- Sidebar Header -->
            <div class="px-3 py-2 border-bottom" style="border-color: #1b2838 !important;">
                <h5 class="mb-0 d-flex align-items-center gap-2" style="color: #0097ee; font-size: 16px;">
                    <i class="bi bi-map"></i> Tile Self Server
                </h5>
            </div>

            <!-- Scrollable content -->
            <div class="flex-grow-1 overflow-auto sidebar-scroll p-1">
                <div class="accordion accordion-flush" id="sidebarAccordion">

                    <!-- PROJECTS -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseProjects">
                                <i class="bi bi-folder2-open me-2"></i> Projects
                            </button>
                        </h2>
                        <div id="collapseProjects" class="accordion-collapse collapse show">
                            <div class="accordion-body">
                                <div id="projectList" class="mb-2">
                                    <div class="text-muted small p-2">Loading...</div>
                                </div>
                                <div class="d-flex gap-1 mb-1">
                                    <button id="btnNewProject" class="btn btn-sm btn-outline-light flex-grow-1">
                                        <i class="bi bi-plus-lg"></i> New
                                    </button>
                                    <button id="btnSave" class="btn btn-sm btn-outline-light flex-grow-1">
                                        <i class="bi bi-save"></i> Save
                                    </button>
                                </div>
                                <div class="d-flex gap-1 mb-1">
                                    <button id="btnExportProject" class="btn btn-sm btn-outline-info flex-grow-1">
                                        <i class="bi bi-download"></i> Export
                                    </button>
                                    <button id="btnImportProject" class="btn btn-sm btn-outline-info flex-grow-1">
                                        <i class="bi bi-upload"></i> Import
                                    </button>
                                    <input type="file" id="projectFileInput" accept=".json" class="d-none">
                                </div>
                                <div id="activeProjectName" class="text-muted small">No project loaded</div>
                            </div>
                        </div>
                    </div>

                    <!-- MAP SETTINGS -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseMapSettings">
                                <i class="bi bi-layers me-2"></i> Map Settings
                            </button>
                        </h2>
                        <div id="collapseMapSettings" class="accordion-collapse collapse show">
                            <div class="accordion-body">
                                <label class="form-label small">Base Layer</label>
                                <select id="baseLayer" class="form-select form-select-sm mb-2">
                                    <option value="roadmap">Google Roadmap</option>
                                    <option value="satellite">Google Satellite</option>
                                    <option value="hybrid">Google Hybrid</option>
                                    <option value="terrain">Google Terrain</option>
                                    <option value="osm">OpenStreetMap</option>
                                    <option value="osm_topo">OpenTopoMap</option>
                                </select>
                                <div class="form-check mb-2">
                                    <input type="checkbox" id="seamarkToggle" class="form-check-input">
                                    <label class="form-check-label small" for="seamarkToggle">SeaMarks Overlay</label>
                                </div>
                                <div class="row g-2 mb-2">
                                    <div class="col-6">
                                        <label class="form-label small">Zoom Min</label>
                                        <input type="number" id="zoomMin" class="form-control form-control-sm" value="10" min="0" max="20">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label small">Zoom Max</label>
                                        <input type="number" id="zoomMax" class="form-control form-control-sm" value="15" min="0" max="20">
                                    </div>
                                </div>
                                <div class="mt-2 mb-2">
                                    <label class="form-label small mb-1">Go to Coordinate</label>
                                    <div class="input-group input-group-sm">
                                        <input type="text" id="coordInput" class="form-control"
                                               placeholder="lat, lng" style="background:#1b2838;color:#eee;border-color:#2a3a4e;">
                                        <button id="btnGoCoord" class="btn btn-outline-info" type="button">
                                            <i class="bi bi-geo-alt"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center justify-content-between">
                                    <span id="modeBadge" class="badge badge-online">ONLINE</span>
                                    <button id="btnToggle" class="btn btn-sm btn-outline-success">
                                        <i class="bi bi-wifi-off"></i> Go Offline
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- DOWNLOAD -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseDownload">
                                <i class="bi bi-download me-2"></i> Download
                            </button>
                        </h2>
                        <div id="collapseDownload" class="accordion-collapse collapse show">
                            <div class="accordion-body">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <span class="small text-muted">Storage:</span>
                                    <div>
                                        <span id="tileStorage" class="small" style="color: #0097ee; font-weight: 600;">--</span>
                                        <button id="btnDedup" class="btn btn-sm btn-outline-info ms-1 py-0 px-1" style="font-size: 0.65rem;" title="Deduplicate tiles (replace identical tiles with hardlinks to save space)">
                                            <i class="bi bi-layers-half"></i> Dedup
                                        </button>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <span class="small text-muted">Tiles:</span>
                                    <span id="tileCount" class="tile-count">0</span>
                                </div>
                                <div id="shapeInfo" class="small text-muted mb-2">Draw a polygon or rectangle on the map</div>
                                <div class="d-grid gap-1">
                                    <button id="btnDownload" class="btn btn-sm btn-danger" disabled>
                                        <i class="bi bi-cloud-download"></i> Download Tiles
                                    </button>
                                    <button id="btnCancel" class="btn btn-sm btn-warning hidden">
                                        <i class="bi bi-x-circle"></i> Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TOOLS -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTools">
                                <i class="bi bi-tools me-2"></i> Tools
                            </button>
                        </h2>
                        <div id="collapseTools" class="accordion-collapse collapse">
                            <div class="accordion-body">
                                <div class="d-grid gap-1">
                                    <button id="btnExclude" class="btn btn-sm btn-outline-purple hidden">
                                        <i class="bi bi-eraser"></i> Exclude Zone
                                    </button>
                                    <button id="btnExportKml" class="btn btn-sm btn-outline-light">
                                        <i class="bi bi-filetype-xml"></i> Export KML
                                    </button>
                                    <button id="btnImportKml" class="btn btn-sm btn-outline-light">
                                        <i class="bi bi-upload"></i> Import KML
                                    </button>
                                    <input type="file" id="kmlFileInput" accept=".kml" class="hidden">
                                    <button id="btnExportPng" class="btn btn-sm btn-outline-warning">
                                        <i class="bi bi-image"></i> Export Map PNG
                                    </button>
                                    <hr class="my-1 border-secondary">
                                    <button id="btnExportTiles" class="btn btn-sm btn-outline-success">
                                        <i class="bi bi-file-earmark-zip"></i> Download Tiles
                                    </button>
                                    <button id="btnImportTiles" class="btn btn-sm btn-outline-success">
                                        <i class="bi bi-cloud-upload"></i> Upload Tiles
                                    </button>
                                    <input type="file" id="tilesFileInput" accept=".tar.gz,.tgz" class="hidden">
                                    <button id="btnClear" class="btn btn-sm btn-outline-secondary">
                                        <i class="bi bi-trash3"></i> Clear All
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Sidebar Footer -->
            <div class="px-3 py-2 border-top text-center small text-muted" style="border-color: #1b2838 !important;">
                <a href="/doc.html" class="text-muted text-decoration-none"><i class="bi bi-book me-1"></i>API Docs</a>
                <span class="mx-1">|</span>
                &copy; 2026 by Ivan
            </div>
        </div>

        <!-- RIGHT CONTENT -->
        <div class="d-flex flex-column flex-grow-1" style="min-width: 0;">
            <!-- Top bar -->
            <div class="d-flex align-items-center justify-content-between px-3" style="background: #0a0a1a; min-height: 34px;">
                <span id="zoomLevel" class="badge" style="background: #1b2838; color: #a8b2d1;">Z: 12</span>
                <span id="coordDisplay" class="small" style="color: #a8b2d1; font-family: monospace;">--</span>
            </div>

            <!-- Map -->
            <div id="map" class="flex-grow-1" style="position: relative; min-height: 0;"></div>

            <!-- Status bar -->
            <div class="status-bar">
                <span id="statusText">Ready</span>
                <div class="progress-wrap">
                    <div id="progressBar" class="progress-fill"></div>
                    <span id="progressText" class="progress-text"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="lib/js/bootstrap.bundle.min.js"></script>
    <script src="lib/js/leaflet.js"></script>
    <script src="lib/js/leaflet.draw.js"></script>
    <script>
        // State
        let currentPolygon = null;
        let holes = [];
        let annotations = [];
        let isOffline = false;
        let currentTaskId = null;
        let eventSource = null;
        let excludeMode = false;
        let activeProjectName = null;

        // Single layer group for all drawn items (required by Leaflet.Draw edit)
        const drawnItems = new L.FeatureGroup();

        function clearLayersByType(dtype) {
            drawnItems.eachLayer(l => { if (l._dtype === dtype) drawnItems.removeLayer(l); });
        }

        // Base layers
        const baseLayers = {
            roadmap: L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20, attribution: '&copy; Google Maps'
            }),
            satellite: L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
                maxZoom: 20, attribution: '&copy; Google Maps'
            }),
            hybrid: L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                maxZoom: 20, attribution: '&copy; Google Maps'
            }),
            terrain: L.tileLayer('https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', {
                maxZoom: 20, attribution: '&copy; Google Maps'
            }),
            osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19, attribution: '&copy; OpenStreetMap contributors'
            }),
            osm_topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                maxZoom: 17, attribution: '&copy; OpenTopoMap'
            })
        };

        // OpenSeaMap overlay
        const seaMarkLayer = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
            maxZoom: 18, opacity: 0.8, attribution: '&copy; OpenSeaMap',
            errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='
        });

        // Offline layer
        const offlineLayer = L.tileLayer('/tiles/{z}/{x}/{y}.png', {
            maxZoom: 20, attribution: 'Offline Tiles'
        });

        let currentBaseLayer = baseLayers.roadmap;

        const map = L.map('map', {
            center: [16.05, 108.20],
            zoom: 12,
            layers: [currentBaseLayer]
        });

        map.addLayer(drawnItems);

        // Fix map sizing in flex layout
        setTimeout(() => map.invalidateSize(), 100);

        // Zoom level display
        map.on('zoomend', function() {
            document.getElementById('zoomLevel').textContent = 'Z: ' + map.getZoom();
        });

        // Cursor coordinate display
        map.on('mousemove', function(e) {
            document.getElementById('coordDisplay').textContent =
                e.latlng.lat.toFixed(6) + ', ' + e.latlng.lng.toFixed(6);
        });

        // Base layer switcher
        document.getElementById('baseLayer').addEventListener('change', function() {
            if (isOffline) return;
            map.removeLayer(currentBaseLayer);
            currentBaseLayer = baseLayers[this.value];
            map.addLayer(currentBaseLayer);
        });

        // SeaMark toggle
        document.getElementById('seamarkToggle').addEventListener('change', function() {
            if (this.checked) map.addLayer(seaMarkLayer);
            else map.removeLayer(seaMarkLayer);
        });

        // Go to coordinate
        function goToCoordinate() {
            const val = document.getElementById('coordInput').value.trim();
            if (!val) return;
            const parts = val.split(',').map(s => parseFloat(s.trim()));
            if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) {
                alert('Invalid format. Use: lat, lng');
                return;
            }
            const [lat, lng] = parts;
            if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
                alert('Lat must be -90..90, Lng must be -180..180');
                return;
            }
            map.flyTo([lat, lng], map.getZoom());
            // Temporary marker
            const tempMarker = L.marker([lat, lng]).addTo(map)
                .bindPopup(lat.toFixed(6) + ', ' + lng.toFixed(6)).openPopup();
            setTimeout(() => map.removeLayer(tempMarker), 5000);
        }
        document.getElementById('btnGoCoord').addEventListener('click', goToCoordinate);
        document.getElementById('coordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') goToCoordinate();
        });

        // Draw control
        const drawControl = new L.Control.Draw({
            draw: {
                polyline: { shapeOptions: { color: '#3498db', weight: 3 } },
                circle: false,
                circlemarker: { shapeOptions: { color: '#2ecc71', fillOpacity: 0.8 } },
                marker: true,
                polygon: {
                    allowIntersection: false,
                    shapeOptions: { color: '#e94560', weight: 2, fillOpacity: 0.15 }
                },
                rectangle: {
                    shapeOptions: { color: '#e94560', weight: 2, fillOpacity: 0.15 }
                }
            },
            edit: { featureGroup: drawnItems, remove: true }
        });
        map.addControl(drawControl);

        // === Utility functions ===

        function getPolygonFromLayer(layer) {
            let latlngs;
            if (layer instanceof L.Rectangle) {
                const b = layer.getBounds();
                latlngs = [b.getSouthWest(), b.getNorthWest(), b.getNorthEast(), b.getSouthEast()];
            } else {
                latlngs = layer.getLatLngs()[0];
            }
            return latlngs.map(ll => ({ lat: ll.lat, lng: ll.lng }));
        }

        function updateShapeInfo() {
            if (!currentPolygon && annotations.length === 0) {
                document.getElementById('shapeInfo').textContent = 'Draw a polygon or rectangle on the map';
                return;
            }
            let parts = [];
            if (currentPolygon) parts.push(`Polygon: ${currentPolygon.length} pts`);
            if (holes.length > 0) parts.push(`${holes.length} hole(s)`);
            if (annotations.length > 0) parts.push(`${annotations.length} mark(s)`);
            document.getElementById('shapeInfo').textContent = parts.join(' | ');
        }

        function hexToKmlColor(hex) {
            const r = hex.slice(1, 3), g = hex.slice(3, 5), b = hex.slice(5, 7);
            return 'ff' + b + g + r;
        }

        function kmlColorToHex(kmlColor) {
            if (!kmlColor || kmlColor.length < 8) return '#3498db';
            const r = kmlColor.slice(6, 8), g = kmlColor.slice(4, 6), b = kmlColor.slice(2, 4);
            return '#' + r + g + b;
        }

        function parseKmlCoordinates(coordText) {
            return coordText.trim().split(/\s+/).map(tuple => {
                const parts = tuple.split(',');
                if (parts.length >= 2) {
                    const lng = parseFloat(parts[0]), lat = parseFloat(parts[1]);
                    if (!isNaN(lat) && !isNaN(lng)) return { lat, lng };
                }
                return null;
            }).filter(p => p !== null);
        }

        function escapeXml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
        }

        function flattenLatLngs(latlngs) {
            if (Array.isArray(latlngs) && latlngs.length > 0 && Array.isArray(latlngs[0])) {
                return latlngs.flat();
            }
            return latlngs;
        }

        function flattenLatLngsForRestore(latlngs) {
            if (Array.isArray(latlngs) && latlngs.length > 0) {
                if (Array.isArray(latlngs[0])) {
                    return latlngs.map(ring => ring.map(p => [p.lat, p.lng]));
                }
                if (latlngs[0] && latlngs[0].lat !== undefined) {
                    return latlngs.map(p => [p.lat, p.lng]);
                }
            }
            return latlngs;
        }

        // === Annotation Modal ===

        const MARKER_ICONS = ['📍','📌','⭐','⚓','🚢','🏠','⛽','🏭','🚩','❌','⚠️','💎'];
        const DEFAULT_COLORS = { polyline: '#3498db', circlemarker: '#2ecc71', marker: '#e94560' };

        function showAnnotationModal(layerType, existing) {
            return new Promise((resolve) => {
                const isMarker = (layerType === 'marker');
                const isPoint = (layerType === 'marker' || layerType === 'circlemarker');
                const editing = !!existing;

                let coordsHtml = '';
                if (isPoint) {
                    const lat = existing ? existing.latlngs.lat : '';
                    const lng = existing ? existing.latlngs.lng : '';
                    coordsHtml = `<div class="prop-row">
                        <div style="flex:1"><label>Lat</label><input type="number" id="propLat" step="any" value="${lat}"></div>
                        <div style="flex:1"><label>Lng</label><input type="number" id="propLng" step="any" value="${lng}"></div>
                    </div>`;
                } else if (layerType === 'polyline') {
                    const pts = existing ? flattenLatLngs(existing.latlngs) : [];
                    const coordText = pts.map(p => `${p.lat}, ${p.lng}`).join('\n');
                    coordsHtml = `<div>
                        <label>Coordinates (lat, lng per line)</label>
                        <textarea id="propCoords" rows="${Math.min(Math.max(pts.length, 2), 8)}">${coordText}</textarea>
                    </div>`;
                }

                const curName = existing ? (existing.name || '') : '';
                const curColor = existing ? (existing.color || DEFAULT_COLORS[layerType]) : (DEFAULT_COLORS[layerType] || '#3498db');
                const curIcon = existing ? (existing.icon || MARKER_ICONS[0]) : MARKER_ICONS[0];

                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `<div class="modal-box" style="min-width:360px">
                    <h3>${editing ? 'Edit' : 'New'} ${isMarker ? 'Marker' : layerType === 'circlemarker' ? 'Circle Marker' : 'Polyline'}</h3>
                    <div class="prop-form">
                        <div>
                            <label>Name / Label</label>
                            <input type="text" id="propName" placeholder="Enter name..." value="${escapeXml(curName)}" autofocus>
                        </div>
                        <div class="prop-row">
                            <label>Color</label>
                            <input type="color" id="propColor" value="${curColor}">
                        </div>
                        ${isMarker ? `<div>
                            <label>Icon</label>
                            <div class="icon-grid" id="iconGrid">
                                ${MARKER_ICONS.map(ic => `<div class="icon-opt${ic===curIcon?' selected':''}" data-icon="${ic}">${ic}</div>`).join('')}
                            </div>
                        </div>` : ''}
                        ${coordsHtml}
                        <div class="prop-actions">
                            <button class="btn btn-secondary btn-sm" id="propCancel">Cancel</button>
                            <button class="btn btn-danger btn-sm" id="propOk">OK</button>
                        </div>
                    </div>
                </div>`;
                document.body.appendChild(overlay);

                let selectedIcon = curIcon;

                if (isMarker) {
                    overlay.querySelectorAll('.icon-opt').forEach(el => {
                        el.addEventListener('click', function() {
                            overlay.querySelectorAll('.icon-opt').forEach(e => e.classList.remove('selected'));
                            this.classList.add('selected');
                            selectedIcon = this.dataset.icon;
                        });
                    });
                }

                const finish = (ok) => {
                    if (!ok) { document.body.removeChild(overlay); resolve(null); return; }
                    const result = {
                        name: overlay.querySelector('#propName').value || '',
                        color: overlay.querySelector('#propColor').value,
                        icon: selectedIcon
                    };
                    if (isPoint) {
                        const latEl = overlay.querySelector('#propLat');
                        const lngEl = overlay.querySelector('#propLng');
                        if (latEl && lngEl && latEl.value && lngEl.value) {
                            result.latlngs = { lat: parseFloat(latEl.value), lng: parseFloat(lngEl.value) };
                        }
                    } else if (layerType === 'polyline') {
                        const coordsEl = overlay.querySelector('#propCoords');
                        if (coordsEl && coordsEl.value.trim()) {
                            const pts = coordsEl.value.trim().split('\n').map(line => {
                                const [lat, lng] = line.split(',').map(s => parseFloat(s.trim()));
                                return { lat, lng };
                            }).filter(p => !isNaN(p.lat) && !isNaN(p.lng));
                            if (pts.length >= 2) result.latlngs = pts;
                        }
                    }
                    document.body.removeChild(overlay);
                    resolve(result);
                };

                overlay.querySelector('#propOk').addEventListener('click', () => finish(true));
                overlay.querySelector('#propCancel').addEventListener('click', () => finish(false));
                overlay.addEventListener('click', (e) => { if (e.target === overlay) finish(false); });
                overlay.querySelector('#propName').addEventListener('keydown', (e) => { if (e.key === 'Enter') finish(true); });
                setTimeout(() => overlay.querySelector('#propName').focus(), 50);
            });
        }

        function createMarkerIcon(icon, color) {
            return L.divIcon({
                html: `<div style="font-size:24px;text-shadow:0 1px 4px rgba(0,0,0,0.5);filter:drop-shadow(0 0 2px ${color})">${icon}</div>`,
                className: '',
                iconSize: [28, 28],
                iconAnchor: [14, 28],
                tooltipAnchor: [0, -28]
            });
        }

        // === Click-to-edit handler ===

        function attachEditHandler(layer) {
            layer.on('click', async function(e) {
                L.DomEvent.stopPropagation(e);
                if (!layer._dtype || layer._dtype !== 'annotation' || !layer._annData) return;
                const ann = layer._annData;
                const props = await showAnnotationModal(ann.type, ann);
                if (!props) return;

                ann.name = props.name;
                ann.color = props.color;
                ann.icon = props.icon;

                if (ann.type === 'marker') {
                    layer.setIcon(createMarkerIcon(props.icon, props.color));
                    if (props.latlngs) { ann.latlngs = props.latlngs; layer.setLatLng([props.latlngs.lat, props.latlngs.lng]); }
                } else if (ann.type === 'circlemarker') {
                    layer.setStyle({ color: props.color, fillColor: props.color, fillOpacity: 0.8 });
                    if (props.latlngs) { ann.latlngs = props.latlngs; layer.setLatLng([props.latlngs.lat, props.latlngs.lng]); }
                } else if (ann.type === 'polyline') {
                    layer.setStyle({ color: props.color, weight: 3 });
                    if (props.latlngs) { ann.latlngs = props.latlngs; layer.setLatLngs(props.latlngs.map(p => [p.lat, p.lng])); }
                }

                if (layer.getTooltip()) layer.unbindTooltip();
                if (props.name) {
                    layer.bindTooltip(props.name, { permanent: true, direction: 'top', className: 'annotation-label' }).openTooltip();
                }
            });
        }

        // === Draw events ===

        map.on(L.Draw.Event.CREATED, async function(e) {
            const layerType = e.layerType;
            const layer = e.layer;

            if (layerType === 'polyline' || layerType === 'marker' || layerType === 'circlemarker') {
                let initData = null;
                if (layerType === 'marker' || layerType === 'circlemarker') {
                    const ll = layer.getLatLng();
                    initData = { latlngs: { lat: ll.lat, lng: ll.lng } };
                } else {
                    initData = { latlngs: layer.getLatLngs().map(ll => ({ lat: ll.lat, lng: ll.lng })) };
                }
                const props = await showAnnotationModal(layerType, initData);
                if (!props) return;

                if (layerType === 'marker') {
                    layer.setIcon(createMarkerIcon(props.icon, props.color));
                    if (props.latlngs) layer.setLatLng([props.latlngs.lat, props.latlngs.lng]);
                } else if (layerType === 'circlemarker') {
                    layer.setStyle({ color: props.color, fillColor: props.color, fillOpacity: 0.8 });
                    if (props.latlngs) layer.setLatLng([props.latlngs.lat, props.latlngs.lng]);
                } else {
                    layer.setStyle({ color: props.color, weight: 3 });
                    if (props.latlngs) layer.setLatLngs(props.latlngs.map(p => [p.lat, p.lng]));
                }

                layer._dtype = 'annotation';
                let latlngs;
                if (layerType === 'marker' || layerType === 'circlemarker') {
                    const ll = layer.getLatLng();
                    latlngs = { lat: ll.lat, lng: ll.lng };
                } else {
                    latlngs = layer.getLatLngs().map(ll => ({ lat: ll.lat, lng: ll.lng }));
                }

                const annData = { type: layerType, latlngs: latlngs, name: props.name, color: props.color, icon: props.icon };
                layer._annData = annData;
                annotations.push(annData);
                drawnItems.addLayer(layer);
                attachEditHandler(layer);

                if (props.name) {
                    layer.bindTooltip(props.name, { permanent: true, direction: 'top', className: 'annotation-label' }).openTooltip();
                }
                updateShapeInfo();
                return;
            }

            if (excludeMode && currentPolygon) {
                const holeStyle = { color: '#e74c3c', weight: 2, fillOpacity: 0.4, fillColor: '#e74c3c', dashArray: '6,4' };
                layer.setStyle(holeStyle);
                layer._dtype = 'hole';
                drawnItems.addLayer(layer);
                holes.push(getPolygonFromLayer(layer));
                updateShapeInfo();
                updateTileCount();
                return;
            }

            clearLayersByType('main');
            clearLayersByType('hole');
            holes = [];
            layer._dtype = 'main';
            drawnItems.addLayer(layer);
            currentPolygon = getPolygonFromLayer(layer);
            document.getElementById('btnDownload').disabled = false;
            document.getElementById('btnExclude').classList.remove('hidden');
            updateShapeInfo();
            updateTileCount();
        });

        // === Edit/Delete events ===

        map.on(L.Draw.Event.EDITED, function(e) {
            e.layers.eachLayer(function(layer) {
                if (layer._dtype === 'main') {
                    currentPolygon = getPolygonFromLayer(layer);
                } else if (layer._dtype === 'hole') {
                    holes = [];
                    drawnItems.eachLayer(l => { if (l._dtype === 'hole') holes.push(getPolygonFromLayer(l)); });
                } else if (layer._dtype === 'annotation' && layer._annData) {
                    if (layer._annData.type === 'marker' || layer._annData.type === 'circlemarker') {
                        const ll = layer.getLatLng();
                        layer._annData.latlngs = { lat: ll.lat, lng: ll.lng };
                    } else {
                        layer._annData.latlngs = layer.getLatLngs().map(ll => ({ lat: ll.lat, lng: ll.lng }));
                    }
                }
            });
            updateShapeInfo();
            if (currentPolygon) updateTileCount();
        });

        map.on(L.Draw.Event.DELETED, function(e) {
            e.layers.eachLayer(function(layer) {
                if (layer._dtype === 'main') {
                    currentPolygon = null;
                    clearLayersByType('hole');
                    holes = [];
                    document.getElementById('btnDownload').disabled = true;
                    document.getElementById('btnExclude').classList.add('hidden');
                } else if (layer._dtype === 'annotation' && layer._annData) {
                    const idx = annotations.indexOf(layer._annData);
                    if (idx >= 0) annotations.splice(idx, 1);
                }
            });
            holes = [];
            drawnItems.eachLayer(l => { if (l._dtype === 'hole') holes.push(getPolygonFromLayer(l)); });
            updateShapeInfo();
            if (currentPolygon) updateTileCount();
        });

        // Exclude mode toggle
        document.getElementById('btnExclude').addEventListener('click', function() {
            excludeMode = !excludeMode;
            this.classList.toggle('active', excludeMode);
            this.innerHTML = excludeMode
                ? '<i class="bi bi-eraser-fill"></i> Drawing Holes...'
                : '<i class="bi bi-eraser"></i> Exclude Zone';
        });

        // Zoom inputs
        document.getElementById('zoomMin').addEventListener('change', updateTileCount);
        document.getElementById('zoomMax').addEventListener('change', updateTileCount);

        function updateTileCount() {
            if (!currentPolygon) return;
            const zoomMin = parseInt(document.getElementById('zoomMin').value);
            const zoomMax = parseInt(document.getElementById('zoomMax').value);
            fetch('/api/count', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ polygon: currentPolygon, holes: holes, zoom_min: zoomMin, zoom_max: zoomMax, base_layer: document.getElementById('baseLayer').value })
            }).then(r => r.json()).then(data => {
                document.getElementById('tileCount').textContent = data.count.toLocaleString();
            });
        }

        // Download
        document.getElementById('btnDownload').addEventListener('click', function() {
            if (!currentPolygon) return;
            const zoomMin = parseInt(document.getElementById('zoomMin').value);
            const zoomMax = parseInt(document.getElementById('zoomMax').value);
            if (zoomMin > zoomMax) { alert('Zoom Min must be <= Zoom Max'); return; }

            this.disabled = true;
            document.getElementById('statusText').textContent = 'Starting download...';
            fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ polygon: currentPolygon, holes: holes, zoom_min: zoomMin, zoom_max: zoomMax, base_layer: document.getElementById('baseLayer').value })
            }).then(r => {
                if (!r.ok) return r.text().then(t => { throw new Error(t); });
                return r.json();
            }).then(data => {
                currentTaskId = data.task_id;
                document.getElementById('btnCancel').classList.remove('hidden');
                startProgressStream(data.task_id);
            }).catch(err => { alert('Error: ' + err.message); this.disabled = false; });
        });

        // Cancel
        document.getElementById('btnCancel').addEventListener('click', function() {
            if (!currentTaskId) return;
            fetch('/api/cancel?task_id=' + currentTaskId).then(() => {
                document.getElementById('statusText').textContent = 'Cancelled';
                cleanup();
            });
        });

        // Progress SSE
        function startProgressStream(taskId) {
            if (eventSource) eventSource.close();
            eventSource = new EventSource('/api/progress?task_id=' + taskId);
            eventSource.onmessage = function(e) {
                const data = JSON.parse(e.data);
                const pct = data.total > 0 ? Math.round(data.done / data.total * 100) : 0;
                document.getElementById('progressBar').style.width = pct + '%';
                document.getElementById('progressText').textContent = `${data.done} / ${data.total} (${pct}%)`;
                const dedupInfo = data.deduped > 0 ? ` | ${data.deduped} deduped` : '';
                document.getElementById('statusText').textContent =
                    `Downloading Z${data.current_zoom} (${data.zoom_min}-${data.zoom_max})... ${data.done}/${data.total} tiles` +
                    (data.errors > 0 ? ` (${data.errors} errors)` : '') + dedupInfo;
                if (data.status === 'completed' || data.status === 'cancelled' || data.status === 'error') {
                    document.getElementById('statusText').textContent =
                        data.status === 'completed'
                            ? `Done! ${data.done} tiles downloaded` + (data.errors > 0 ? ` (${data.errors} errors)` : '') + dedupInfo
                            : `${data.status}: ${data.done}/${data.total} tiles`;
                    cleanup();
                }
            };
            eventSource.onerror = function() { cleanup(); };
        }

        function cleanup() {
            if (eventSource) { eventSource.close(); eventSource = null; }
            document.getElementById('btnDownload').disabled = false;
            document.getElementById('btnCancel').classList.add('hidden');
            currentTaskId = null;
            refreshTileSize();
        }

        // Toggle online/offline
        document.getElementById('btnToggle').addEventListener('click', function() {
            isOffline = !isOffline;
            const badge = document.getElementById('modeBadge');
            if (isOffline) {
                map.removeLayer(currentBaseLayer);
                map.removeLayer(seaMarkLayer);
                map.addLayer(offlineLayer);
                this.innerHTML = '<i class="bi bi-wifi"></i> Go Online';
                badge.textContent = 'OFFLINE';
                badge.className = 'badge badge-offline';
            } else {
                map.removeLayer(offlineLayer);
                map.addLayer(currentBaseLayer);
                if (document.getElementById('seamarkToggle').checked) map.addLayer(seaMarkLayer);
                this.innerHTML = '<i class="bi bi-wifi-off"></i> Go Offline';
                badge.textContent = 'ONLINE';
                badge.className = 'badge badge-online';
            }
        });

        // === KML Export ===

        function generateKML() {
            let placemarks = '';

            if (currentPolygon) {
                let outerRing = currentPolygon.map(p => `${p.lng},${p.lat},0`).join(' ');
                outerRing += ` ${currentPolygon[0].lng},${currentPolygon[0].lat},0`;

                let innerRings = '';
                for (const hole of holes) {
                    let hc = hole.map(p => `${p.lng},${p.lat},0`).join(' ');
                    hc += ` ${hole[0].lng},${hole[0].lat},0`;
                    innerRings += `<innerBoundaryIs><LinearRing><coordinates>${hc}</coordinates></LinearRing></innerBoundaryIs>`;
                }

                placemarks += `<Placemark><name>Download Area</name>
                    <Style><PolyStyle><color>26004de9</color></PolyStyle><LineStyle><color>ff004de9</color><width>2</width></LineStyle></Style>
                    <Polygon><outerBoundaryIs><LinearRing><coordinates>${outerRing}</coordinates></LinearRing></outerBoundaryIs>${innerRings}</Polygon></Placemark>`;
            }

            for (const ann of annotations) {
                const name = escapeXml(ann.name || 'Untitled');
                const kmlColor = hexToKmlColor(ann.color || DEFAULT_COLORS[ann.type] || '#3498db');
                if (ann.type === 'marker' || ann.type === 'circlemarker') {
                    placemarks += `<Placemark><name>${name}</name>
                        <Style><IconStyle><color>${kmlColor}</color></IconStyle></Style>
                        <Point><coordinates>${ann.latlngs.lng},${ann.latlngs.lat},0</coordinates></Point></Placemark>`;
                } else if (ann.type === 'polyline') {
                    const coords = flattenLatLngs(ann.latlngs).map(p => `${p.lng},${p.lat},0`).join(' ');
                    placemarks += `<Placemark><name>${name}</name>
                        <Style><LineStyle><color>${kmlColor}</color><width>3</width></LineStyle></Style>
                        <LineString><coordinates>${coords}</coordinates></LineString></Placemark>`;
                }
            }

            return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document><name>Tile Server Export</name>${placemarks}</Document></kml>`;
        }

        document.getElementById('btnExportKml').addEventListener('click', function() {
            if (!currentPolygon && annotations.length === 0) {
                alert('Nothing to export. Draw shapes or annotations first.');
                return;
            }
            const kml = generateKML();
            const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'export.kml';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // === KML Import ===

        function importKML(kmlText) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(kmlText, 'application/xml');
            const parseError = doc.querySelector('parsererror');
            if (parseError) { alert('Invalid KML file'); return; }

            // Clear existing
            drawnItems.clearLayers();
            currentPolygon = null;
            holes = [];
            annotations = [];
            excludeMode = false;
            activeProjectName = null;
            document.getElementById('btnExclude').classList.add('hidden');
            document.getElementById('btnExclude').classList.remove('active');
            document.getElementById('activeProjectName').textContent = 'No project loaded';

            const placemarks = doc.querySelectorAll('Placemark');
            let importedPolygon = false;
            const bounds = L.latLngBounds();

            placemarks.forEach(pm => {
                const nameEl = pm.querySelector('name');
                const name = nameEl ? nameEl.textContent : '';

                // Extract color from style
                let color = '#3498db';
                const lineColor = pm.querySelector('LineStyle > color');
                const polyColor = pm.querySelector('PolyStyle > color');
                const iconColor = pm.querySelector('IconStyle > color');
                if (lineColor) color = kmlColorToHex(lineColor.textContent);
                else if (polyColor) color = kmlColorToHex(polyColor.textContent);
                else if (iconColor) color = kmlColorToHex(iconColor.textContent);

                // Polygon
                const polygon = pm.querySelector('Polygon');
                if (polygon) {
                    const outerCoords = polygon.querySelector('outerBoundaryIs LinearRing coordinates');
                    if (outerCoords && !importedPolygon) {
                        const pts = parseKmlCoordinates(outerCoords.textContent);
                        if (pts.length >= 3) {
                            // Remove closing point if same as first
                            if (pts.length > 3 && pts[0].lat === pts[pts.length-1].lat && pts[0].lng === pts[pts.length-1].lng) {
                                pts.pop();
                            }
                            currentPolygon = pts;
                            const layer = L.polygon(pts.map(p => [p.lat, p.lng]), {
                                color: '#e94560', weight: 2, fillOpacity: 0.15
                            });
                            layer._dtype = 'main';
                            drawnItems.addLayer(layer);
                            pts.forEach(p => bounds.extend([p.lat, p.lng]));
                            importedPolygon = true;
                            document.getElementById('btnDownload').disabled = false;
                            document.getElementById('btnExclude').classList.remove('hidden');
                        }
                    }

                    // Inner boundaries (holes)
                    const innerBounds = polygon.querySelectorAll('innerBoundaryIs LinearRing coordinates');
                    innerBounds.forEach(ic => {
                        const holePts = parseKmlCoordinates(ic.textContent);
                        if (holePts.length >= 3) {
                            if (holePts.length > 3 && holePts[0].lat === holePts[holePts.length-1].lat && holePts[0].lng === holePts[holePts.length-1].lng) {
                                holePts.pop();
                            }
                            holes.push(holePts);
                            const layer = L.polygon(holePts.map(p => [p.lat, p.lng]), {
                                color: '#e74c3c', weight: 2, fillOpacity: 0.4, fillColor: '#e74c3c', dashArray: '6,4'
                            });
                            layer._dtype = 'hole';
                            drawnItems.addLayer(layer);
                        }
                    });
                    return;
                }

                // Point (Marker)
                const point = pm.querySelector('Point coordinates');
                if (point) {
                    const pts = parseKmlCoordinates(point.textContent);
                    if (pts.length >= 1) {
                        const p = pts[0];
                        const icon = '📍';
                        const annData = { type: 'marker', latlngs: p, name: name, color: color, icon: icon };
                        const layer = L.marker([p.lat, p.lng], { icon: createMarkerIcon(icon, color) });
                        layer._dtype = 'annotation';
                        layer._annData = annData;
                        drawnItems.addLayer(layer);
                        attachEditHandler(layer);
                        if (name) layer.bindTooltip(name, { permanent: true, direction: 'top', className: 'annotation-label' }).openTooltip();
                        annotations.push(annData);
                        bounds.extend([p.lat, p.lng]);
                    }
                    return;
                }

                // LineString (Polyline)
                const lineString = pm.querySelector('LineString coordinates');
                if (lineString) {
                    const pts = parseKmlCoordinates(lineString.textContent);
                    if (pts.length >= 2) {
                        const annData = { type: 'polyline', latlngs: pts, name: name, color: color, icon: '📍' };
                        const layer = L.polyline(pts.map(p => [p.lat, p.lng]), { color: color, weight: 3 });
                        layer._dtype = 'annotation';
                        layer._annData = annData;
                        drawnItems.addLayer(layer);
                        attachEditHandler(layer);
                        if (name) layer.bindTooltip(name, { permanent: true, direction: 'top', className: 'annotation-label' }).openTooltip();
                        annotations.push(annData);
                        pts.forEach(p => bounds.extend([p.lat, p.lng]));
                    }
                    return;
                }
            });

            // Fit map to imported data
            if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50] });

            updateShapeInfo();
            if (currentPolygon) updateTileCount();

            const parts = [];
            if (currentPolygon) parts.push('polygon');
            if (holes.length) parts.push(holes.length + ' hole(s)');
            if (annotations.length) parts.push(annotations.length + ' annotation(s)');
            document.getElementById('statusText').textContent = 'KML imported: ' + (parts.join(', ') || 'empty');
            refreshProjectList();
        }

        // Import KML button
        document.getElementById('btnImportKml').addEventListener('click', function() {
            document.getElementById('kmlFileInput').click();
        });

        document.getElementById('kmlFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.name.toLowerCase().endsWith('.kml')) { alert('Please select a .kml file'); return; }
            const reader = new FileReader();
            reader.onload = function(evt) { importKML(evt.target.result); };
            reader.readAsText(file);
            this.value = '';
        });

        // === Export Map PNG ===
        function exportMapPng() {
            const btn = document.getElementById('btnExportPng');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Rendering...';

            const mapSize = map.getSize();
            const canvas = document.createElement('canvas');
            canvas.width = mapSize.x;
            canvas.height = mapSize.y;
            const ctx = canvas.getContext('2d');

            const zoom = map.getZoom();
            const bounds = map.getPixelBounds();
            const tileSize = 256;
            const nw = bounds.min.divideBy(tileSize).floor();
            const se = bounds.max.divideBy(tileSize).floor();

            const promises = [];
            for (let x = nw.x; x <= se.x; x++) {
                for (let y = nw.y; y <= se.y; y++) {
                    const tileX = ((x % Math.pow(2, zoom)) + Math.pow(2, zoom)) % Math.pow(2, zoom);
                    const tileY = y;
                    if (tileY < 0 || tileY >= Math.pow(2, zoom)) continue;

                    const px = x * tileSize - bounds.min.x;
                    const py = y * tileSize - bounds.min.y;

                    promises.push(new Promise(resolve => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = function() { ctx.drawImage(img, px, py, tileSize, tileSize); resolve(); };
                        img.onerror = function() { resolve(); }; // skip missing tiles
                        // Use current visible layer URL
                        const baseVal = document.getElementById('baseLayer').value;
                        const layer = baseLayers[baseVal] || baseLayers['roadmap'];
                        let url = layer._url;
                        url = url.replace('{z}', zoom).replace('{x}', tileX).replace('{y}', tileY);
                        if (url.includes('{s}')) url = url.replace('{s}', ['a','b','c'][tileX % 3]);
                        img.src = url;
                    }));
                }
            }

            Promise.all(promises).then(() => {
                // Draw polygon overlay
                if (currentPolygon) {
                    ctx.beginPath();
                    currentPolygon.forEach((p, i) => {
                        const pt = map.latLngToContainerPoint([p.lat, p.lng]);
                        if (i === 0) ctx.moveTo(pt.x, pt.y);
                        else ctx.lineTo(pt.x, pt.y);
                    });
                    ctx.closePath();
                    ctx.strokeStyle = '#0097ee';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(0, 151, 238, 0.15)';
                    ctx.fill();
                }

                // Draw holes
                holes.forEach(hole => {
                    ctx.beginPath();
                    hole.forEach((p, i) => {
                        const pt = map.latLngToContainerPoint([p.lat, p.lng]);
                        if (i === 0) ctx.moveTo(pt.x, pt.y);
                        else ctx.lineTo(pt.x, pt.y);
                    });
                    ctx.closePath();
                    ctx.strokeStyle = '#e94560';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(233, 69, 96, 0.2)';
                    ctx.fill();
                });

                // Draw annotations
                annotations.forEach(ann => {
                    if (ann.type === 'marker' || ann.type === 'circlemarker') {
                        const pt = map.latLngToContainerPoint([ann.latlngs.lat, ann.latlngs.lng]);
                        ctx.font = '24px serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(ann.icon || '📍', pt.x, pt.y);
                        if (ann.name) {
                            ctx.font = '12px sans-serif';
                            ctx.fillStyle = '#fff';
                            ctx.strokeStyle = '#000';
                            ctx.lineWidth = 3;
                            ctx.strokeText(ann.name, pt.x, pt.y - 20);
                            ctx.fillText(ann.name, pt.x, pt.y - 20);
                        }
                    } else if (ann.type === 'polyline') {
                        const pts = Array.isArray(ann.latlngs[0]) ? ann.latlngs.flat() : ann.latlngs;
                        ctx.beginPath();
                        pts.forEach((p, i) => {
                            const pt = map.latLngToContainerPoint([p.lat, p.lng]);
                            if (i === 0) ctx.moveTo(pt.x, pt.y);
                            else ctx.lineTo(pt.x, pt.y);
                        });
                        ctx.strokeStyle = ann.color || '#3498db';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    }
                });

                // Download
                canvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'map-export.png';
                    a.click();
                    URL.revokeObjectURL(url);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-image"></i> Export Map PNG';
                }, 'image/png');
            });
        }

        document.getElementById('btnExportPng').addEventListener('click', exportMapPng);

        // === Export/Import Tiles ===
        document.getElementById('btnExportTiles').addEventListener('click', function() {
            window.location.href = '/api/export-tiles';
        });

        document.getElementById('btnImportTiles').addEventListener('click', function() {
            document.getElementById('tilesFileInput').click();
        });

        document.getElementById('tilesFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const btn = document.getElementById('btnImportTiles');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Uploading...';
            const form = new FormData();
            form.append('file', file);
            fetch('/api/import-tiles', { method: 'POST', body: form })
                .then(r => r.json())
                .then(data => {
                    alert('Imported ' + data.files + ' tiles');
                    refreshTileSize();
                })
                .catch(err => alert('Upload failed: ' + err))
                .finally(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-cloud-upload"></i> Upload Tiles';
                });
            this.value = '';
        });

        // === Tile Storage Size ===
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function refreshTileSize() {
            fetch('/api/tile-size')
                .then(r => r.json())
                .then(data => {
                    const el = document.getElementById('tileStorage');
                    el.textContent = formatBytes(data.size) + ' (' + data.files.toLocaleString() + ' files)';
                })
                .catch(() => {
                    document.getElementById('tileStorage').textContent = '--';
                });
        }

        document.getElementById('btnDedup').addEventListener('click', function() {
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> ...';
            document.getElementById('statusText').textContent = 'Deduplicating tiles...';
            fetch('/api/dedup')
                .then(r => r.json())
                .then(data => {
                    const msg = `Dedup: ${data.total_files} files, ${data.unique_files} unique, ${data.duplicates} duplicates removed, ${formatBytes(data.saved_bytes)} saved`;
                    document.getElementById('statusText').textContent = msg;
                    refreshTileSize();
                })
                .catch(err => {
                    document.getElementById('statusText').textContent = 'Dedup failed: ' + err.message;
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-layers-half"></i> Dedup';
                });
        });

        // === Project Management ===

        function refreshProjectList() {
            fetch('/api/drawings')
                .then(r => r.json())
                .then(names => {
                    const list = document.getElementById('projectList');
                    list.innerHTML = '';
                    if (!names || names.length === 0) {
                        list.innerHTML = '<div class="text-muted small p-2">No saved projects</div>';
                        return;
                    }
                    names.forEach(name => {
                        const item = document.createElement('div');
                        item.className = 'project-item' + (name === activeProjectName ? ' active' : '');
                        item.innerHTML = `
                            <span class="project-name text-truncate" style="flex:1">${escapeXml(name)}</span>
                            <span class="project-actions">
                                <button class="btn btn-sm btn-outline-light py-0 px-1 btn-rename" title="Rename" data-name="${escapeXml(name)}">
                                    <i class="bi bi-pencil" style="font-size:11px"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger py-0 px-1 btn-delete" title="Delete" data-name="${escapeXml(name)}">
                                    <i class="bi bi-trash3" style="font-size:11px"></i>
                                </button>
                            </span>`;

                        item.querySelector('.project-name').addEventListener('click', () => loadProject(name));
                        item.querySelector('.btn-rename').addEventListener('click', (e) => { e.stopPropagation(); renameProject(name); });
                        item.querySelector('.btn-delete').addEventListener('click', (e) => { e.stopPropagation(); deleteProject(name); });

                        list.appendChild(item);
                    });
                })
                .catch(() => {
                    document.getElementById('projectList').innerHTML = '<div class="text-muted small p-2">Failed to load</div>';
                });
        }

        function loadProject(name) {
            loadDrawing(name);
            activeProjectName = name;
            document.getElementById('activeProjectName').textContent = 'Active: ' + name;
            refreshProjectList();
        }

        function deleteProject(name) {
            if (!confirm('Delete project "' + name + '"?')) return;
            fetch('/api/drawings?name=' + encodeURIComponent(name), { method: 'DELETE' })
                .then(r => {
                    if (!r.ok) throw new Error('Delete failed');
                    return r.json();
                })
                .then(() => {
                    if (activeProjectName === name) {
                        activeProjectName = null;
                        document.getElementById('activeProjectName').textContent = 'No project loaded';
                    }
                    document.getElementById('statusText').textContent = 'Deleted: ' + name;
                    refreshProjectList();
                })
                .catch(err => alert('Delete failed: ' + err.message));
        }

        function renameProject(oldName) {
            const newName = prompt('Enter new name for "' + oldName + '":', oldName);
            if (!newName || newName === oldName) return;

            fetch('/api/drawings?name=' + encodeURIComponent(oldName))
                .then(r => { if (!r.ok) throw new Error('Not found'); return r.json(); })
                .then(config => {
                    config.name = newName;
                    return fetch('/api/drawings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(config)
                    });
                })
                .then(r => { if (!r.ok) throw new Error('Save failed'); return fetch('/api/drawings?name=' + encodeURIComponent(oldName), { method: 'DELETE' }); })
                .then(() => {
                    if (activeProjectName === oldName) {
                        activeProjectName = newName;
                        document.getElementById('activeProjectName').textContent = 'Active: ' + newName;
                    }
                    document.getElementById('statusText').textContent = 'Renamed: ' + oldName + ' → ' + newName;
                    refreshProjectList();
                })
                .catch(err => alert('Rename failed: ' + err.message));
        }

        // Save
        document.getElementById('btnSave').addEventListener('click', function() {
            const defaultName = activeProjectName || '';
            const name = prompt('Enter a name for this project:', defaultName);
            if (!name) return;
            const config = {
                name: name,
                polygon: currentPolygon,
                holes: holes,
                annotations: annotations,
                zoom_min: parseInt(document.getElementById('zoomMin').value),
                zoom_max: parseInt(document.getElementById('zoomMax').value),
                map_center: { lat: map.getCenter().lat, lng: map.getCenter().lng },
                map_zoom: map.getZoom()
            };
            fetch('/api/drawings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            }).then(r => {
                if (!r.ok) return r.text().then(t => { throw new Error(t); });
                return r.json();
            }).then(() => {
                activeProjectName = name;
                document.getElementById('activeProjectName').textContent = 'Active: ' + name;
                document.getElementById('statusText').textContent = 'Saved: ' + name;
                refreshProjectList();
            }).catch(err => alert('Save failed: ' + err.message));
        });

        // New project
        document.getElementById('btnNewProject').addEventListener('click', function() {
            const name = prompt('Enter a name for the new project:');
            if (!name) return;

            drawnItems.clearLayers();
            currentPolygon = null;
            holes = [];
            annotations = [];
            excludeMode = false;
            document.getElementById('btnExclude').classList.add('hidden');
            document.getElementById('btnExclude').classList.remove('active');
            document.getElementById('btnDownload').disabled = true;
            document.getElementById('shapeInfo').textContent = 'Draw a polygon or rectangle on the map';
            document.getElementById('tileCount').textContent = '0';

            const config = {
                name: name,
                polygon: null,
                holes: [],
                annotations: [],
                zoom_min: parseInt(document.getElementById('zoomMin').value),
                zoom_max: parseInt(document.getElementById('zoomMax').value),
                map_center: { lat: map.getCenter().lat, lng: map.getCenter().lng },
                map_zoom: map.getZoom()
            };

            fetch('/api/drawings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            }).then(r => {
                if (!r.ok) throw new Error('Failed to create');
                return r.json();
            }).then(() => {
                activeProjectName = name;
                document.getElementById('activeProjectName').textContent = 'Active: ' + name;
                document.getElementById('statusText').textContent = 'Created: ' + name;
                refreshProjectList();
            }).catch(err => alert('Create failed: ' + err.message));
        });

        // Restore project config into the map
        function restoreProject(config) {
            drawnItems.clearLayers();
            currentPolygon = null;
            holes = [];
            annotations = [];
            excludeMode = false;
            document.getElementById('btnExclude').classList.add('hidden');
            document.getElementById('btnExclude').classList.remove('active');

            if (config.polygon && config.polygon.length >= 3) {
                currentPolygon = config.polygon;
                const layer = L.polygon(config.polygon.map(p => [p.lat, p.lng]), {
                    color: '#e94560', weight: 2, fillOpacity: 0.15
                });
                layer._dtype = 'main';
                drawnItems.addLayer(layer);
                document.getElementById('btnDownload').disabled = false;
                document.getElementById('btnExclude').classList.remove('hidden');
            }

            if (config.holes) {
                for (const hole of config.holes) {
                    holes.push(hole);
                    const layer = L.polygon(hole.map(p => [p.lat, p.lng]), {
                        color: '#e74c3c', weight: 2, fillOpacity: 0.4, fillColor: '#e74c3c', dashArray: '6,4'
                    });
                    layer._dtype = 'hole';
                    drawnItems.addLayer(layer);
                }
            }

            if (config.annotations) {
                for (const ann of config.annotations) {
                    const color = ann.color || DEFAULT_COLORS[ann.type] || '#3498db';
                    let layer;
                    if (ann.type === 'marker') {
                        const icon = ann.icon || '📍';
                        layer = L.marker([ann.latlngs.lat, ann.latlngs.lng], { icon: createMarkerIcon(icon, color) });
                    } else if (ann.type === 'circlemarker') {
                        layer = L.circleMarker([ann.latlngs.lat, ann.latlngs.lng], { color: color, fillColor: color, fillOpacity: 0.8 });
                    } else if (ann.type === 'polyline') {
                        layer = L.polyline(flattenLatLngsForRestore(ann.latlngs), { color: color, weight: 3 });
                    }
                    if (layer) {
                        layer._dtype = 'annotation';
                        layer._annData = ann;
                        drawnItems.addLayer(layer);
                        attachEditHandler(layer);
                        if (ann.name) {
                            layer.bindTooltip(ann.name, { permanent: true, direction: 'top', className: 'annotation-label' }).openTooltip();
                        }
                        annotations.push(ann);
                    }
                }
            }

            if (config.zoom_min !== undefined) document.getElementById('zoomMin').value = config.zoom_min;
            if (config.zoom_max !== undefined) document.getElementById('zoomMax').value = config.zoom_max;
            if (config.map_center && config.map_zoom) {
                map.setView([config.map_center.lat, config.map_center.lng], config.map_zoom);
            }

            updateShapeInfo();
            if (currentPolygon) updateTileCount();
        }

        // Load drawing from server
        function loadDrawing(name) {
            fetch('/api/drawings?name=' + encodeURIComponent(name))
                .then(r => { if (!r.ok) throw new Error('Not found'); return r.json(); })
                .then(config => {
                    restoreProject(config);
                    activeProjectName = name;
                    document.getElementById('activeProjectName').textContent = 'Active: ' + name;
                    document.getElementById('statusText').textContent = 'Loaded: ' + name;
                })
                .catch(err => alert('Load failed: ' + err.message));
        }

        // Export project to JSON file
        document.getElementById('btnExportProject').addEventListener('click', function() {
            const config = {
                name: activeProjectName || 'untitled',
                polygon: currentPolygon,
                holes: holes,
                annotations: annotations,
                zoom_min: parseInt(document.getElementById('zoomMin').value),
                zoom_max: parseInt(document.getElementById('zoomMax').value),
                map_center: { lat: map.getCenter().lat, lng: map.getCenter().lng },
                map_zoom: map.getZoom()
            };
            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (config.name || 'project') + '.json';
            a.click();
            URL.revokeObjectURL(url);
            document.getElementById('statusText').textContent = 'Exported: ' + config.name;
        });

        // Import project from JSON file
        document.getElementById('btnImportProject').addEventListener('click', function() {
            document.getElementById('projectFileInput').click();
        });
        document.getElementById('projectFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const config = JSON.parse(ev.target.result);
                    restoreProject(config);
                    const name = config.name || file.name.replace('.json', '');
                    activeProjectName = name;
                    document.getElementById('activeProjectName').textContent = 'Active: ' + name;
                    document.getElementById('statusText').textContent = 'Imported: ' + name;
                } catch (err) {
                    alert('Invalid project file: ' + err.message);
                }
            };
            reader.readAsText(file);
            this.value = '';
        });

        // Clear all
        document.getElementById('btnClear').addEventListener('click', function() {
            drawnItems.clearLayers();
            currentPolygon = null;
            holes = [];
            annotations = [];
            excludeMode = false;
            activeProjectName = null;
            document.getElementById('btnExclude').classList.add('hidden');
            document.getElementById('btnExclude').classList.remove('active');
            document.getElementById('btnDownload').disabled = true;
            document.getElementById('shapeInfo').textContent = 'Draw a polygon or rectangle on the map';
            document.getElementById('tileCount').textContent = '0';
            document.getElementById('activeProjectName').textContent = 'No project loaded';
            refreshProjectList();
        });

        // Init: load project list, tile size, and resume running tasks
        refreshProjectList();
        refreshTileSize();
        fetch('/api/tasks').then(r => r.json()).then(tasks => {
            if (!Array.isArray(tasks)) return;
            const running = tasks.find(t => t.status === 'running');
            if (running) {
                currentTaskId = running.id;
                document.getElementById('btnDownload').disabled = true;
                document.getElementById('btnCancel').classList.remove('hidden');
                startProgressStream(running.id);
            }
        }).catch(() => {});
    </script>
</body>
</html>
